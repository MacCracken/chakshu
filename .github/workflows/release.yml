name: Release

# Triggers on semver tags only (1.0.0, 1.2.3, 2.0.0-rc1). An optional
# leading `v` is accepted (v1.0.0). Non-numeric tags are ignored.
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  # ────────────────────────────────────────────────────────────────
  # Gate — full CI must pass before anything builds for release.
  # Reuses ci.yml via workflow_call so the release path can never
  # ship a binary that hasn't passed lint / tests / smoke / DCE
  # parity / security scan / docs check.
  # ────────────────────────────────────────────────────────────────
  ci:
    name: CI gate
    uses: ./.github/workflows/ci.yml

  # ────────────────────────────────────────────────────────────────
  # Verify — VERSION file, cyrius.cyml indirection, CHAKSHU_VERSION
  # literal, and the git tag must all agree before anything is
  # packaged. Same set as the docs job in ci.yml plus the tag.
  # ────────────────────────────────────────────────────────────────
  version-verify:
    name: Version verify
    needs: ci
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract VERSION / tag / cyml / src version
        id: extract
        run: |
          TAG="${GITHUB_REF_NAME#v}"   # strip optional leading 'v'
          echo "$TAG" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+' \
            || { echo "::error::tag ($TAG) is not semver"; exit 1; }

          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "VERSION file:  $VERSION"
          echo "git tag:       $TAG"

          if ! grep -qE '^version *= *"\$\{file:VERSION\}"' cyrius.cyml; then
            echo "::error::cyrius.cyml version no longer resolves via \${file:VERSION}" >&2
            exit 1
          fi

          if ! grep -qE "CHAKSHU_VERSION *= *\"chakshu ${VERSION}\"" src/cli.cyr; then
            echo "::error::CHAKSHU_VERSION in src/cli.cyr != VERSION ($VERSION)" >&2
            exit 1
          fi

          if [ "$VERSION" != "$TAG" ]; then
            echo "::error::VERSION ($VERSION) != git tag ($TAG)" >&2
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  # ────────────────────────────────────────────────────────────────
  # Build — DCE'd release binary per target platform.
  # Matrix scoped to targets the Cyrius toolchain ships installers
  # for today (x86_64-linux). Expand with aarch64-linux when chakshu
  # picks up a second consumer arch — AGNOS targets both, but no
  # M1/M2 user is on aarch64 yet.
  # ────────────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.target }})
    needs: version-verify
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-linux
            runs-on: ubuntu-latest
    env:
      CYRIUS_DCE: '1'
      VERSION: ${{ needs.version-verify.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        # Same pattern as ci.yml: exec the install.sh bundled in the
        # release tarball rather than hand-rolling the layout. Cyrius
        # 6.0.1+ requires the versioned ~/.cyrius/versions/<ver>/ tree
        # that the upstream installer sets up correctly.
        run: |
          CYRIUS_VERSION=$(grep 'cyrius *= *"' cyrius.cyml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "Installing Cyrius $CYRIUS_VERSION"
          curl -sLO "https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/cyrius-$CYRIUS_VERSION-${{ matrix.target }}.tar.gz"
          tar xzf "cyrius-$CYRIUS_VERSION-${{ matrix.target }}.tar.gz"
          CYRIUS_VERSION="$CYRIUS_VERSION" sh "cyrius-$CYRIUS_VERSION-${{ matrix.target }}/install.sh"
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH

      - name: Resolve dependencies
        run: |
          cyrius deps
          cyrius lib sync   # vendor stdlib modules (incl. `sys`) into lib/ —
                            # the lean build reads sys.cyr for mihi 1.1.3's sys_uname/sys_sysinfo

      - name: Build DCE'd binary (lean shu)
        run: |
          mkdir -p build
          cyrius build src/main.cyr build/shu
          echo "shu: $(wc -c < build/shu) bytes"

      - name: Re-run smoke on the release binary
        run: bash scripts/smoke.sh build/shu

      - name: Build DCE'd binary (shu-ai)
        # The AI variant: ai/ sub-project sharing ../src/* (parent includes
        # permitted) + the sandhi/niyama dep chain. Inherits CYRIUS_DCE=1
        # from the job env. The monitor surface is identical, so the same
        # smoke applies — exercises shu-ai's CLI/snapshot paths too.
        env:
          CYRIUS_ALLOW_PARENT_INCLUDES: "1"
        run: |
          cd ai
          cyrius deps
          cyrius lib sync
          mkdir -p build
          cyrius build main.cyr build/shu-ai
          echo "shu-ai: $(wc -c < build/shu-ai) bytes"
          bash ../scripts/smoke.sh build/shu-ai

      - name: Package release artifacts
        # Ships both binaries + project metadata as separate tarballs:
        #   chakshu-<ver>-<target>      → lean `shu` (monitor, ~0.84 MB)
        #   chakshu-ai-<ver>-<target>   → `shu-ai` (+AI, ~2.57 MB)
        # No vendored lib/ — consumers building from source run
        # `cyrius deps` themselves. The downstream SHA256/release steps
        # glob *.tar.gz, so a second tarball flows through automatically.
        run: |
          mkdir -p out

          PKG="chakshu-${VERSION}-${{ matrix.target }}"
          mkdir -p "pkg/$PKG"
          cp build/shu "pkg/$PKG/"
          cp README.md LICENSE CHANGELOG.md VERSION "pkg/$PKG/"
          tar czf "out/${PKG}.tar.gz" -C pkg "$PKG"

          PKGAI="chakshu-ai-${VERSION}-${{ matrix.target }}"
          mkdir -p "pkg/$PKGAI"
          cp ai/build/shu-ai "pkg/$PKGAI/"
          cp README.md LICENSE CHANGELOG.md VERSION "pkg/$PKGAI/"
          tar czf "out/${PKGAI}.tar.gz" -C pkg "$PKGAI"

      - name: Generate SHA256
        run: |
          cd out
          sha256sum *.tar.gz > SHA256SUMS.${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            out/*.tar.gz
            out/SHA256SUMS.*

  # ────────────────────────────────────────────────────────────────
  # Source tarball — language-agnostic, always linux runner.
  # ────────────────────────────────────────────────────────────────
  source:
    name: Source tarball
    needs: version-verify
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.version-verify.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Create source tarball
        run: |
          mkdir -p out
          git archive --format=tar.gz \
            --prefix="chakshu-${VERSION}/" \
            -o "out/chakshu-${VERSION}-src.tar.gz" HEAD
          cd out
          sha256sum "chakshu-${VERSION}-src.tar.gz" > SHA256SUMS.src

      - name: Upload source artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-source
          path: |
            out/*.tar.gz
            out/SHA256SUMS.src

  # ────────────────────────────────────────────────────────────────
  # Release — collect artifacts + checksums, publish GitHub release.
  # Body pulled from the matching CHANGELOG.md section. Pre-1.0
  # releases are flagged prerelease so package managers don't
  # auto-promote them.
  # ────────────────────────────────────────────────────────────────
  release:
    name: GitHub release
    needs: [build, source, version-verify]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.version-verify.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Download all release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-raw

      - name: Consolidate artifacts
        run: |
          mkdir -p out
          find dist-raw -type f \( -name '*.tar.gz' -o -name 'SHA256SUMS.*' \) \
            -exec cp {} out/ \;
          cd out
          cat SHA256SUMS.* | sort -u > SHA256SUMS
          rm -f SHA256SUMS.*
          ls -la

      - name: Extract release body from CHANGELOG
        run: |
          awk -v ver="${VERSION}" '
            $0 ~ "^## \\[" ver "\\]" { found=1; next }
            found && /^## \[/         { exit }
            found                    { print }
          ' CHANGELOG.md > /tmp/body.md
          if [ ! -s /tmp/body.md ]; then
            echo "::warning::CHANGELOG.md has no body for ${VERSION}; falling back to generated notes"
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "chakshu ${{ env.VERSION }}"
          body_path: /tmp/body.md
          prerelease: ${{ startsWith(env.VERSION, '0.') }}
          files: |
            out/*.tar.gz
            out/SHA256SUMS
          generate_release_notes: true
          fail_on_unmatched_files: true
